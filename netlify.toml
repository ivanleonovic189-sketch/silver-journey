[build]
  command = "npm install && npm run install:all && cd frontend && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

# API → serverless backend (должен быть выше SPA-редиректа)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
