[build]
  publish = "frontend/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/**"]

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"
  ADMIN_VERIFY_SECRET = "enter-pay-admin-2026"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET"]}
