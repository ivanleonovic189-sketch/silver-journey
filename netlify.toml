[build]
  command = "npm install && npm run install:all && cd netlify/functions && npm install && cd ../.. && cd frontend && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "none"
  included_files = ["backend/**"]

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET"]}
